name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - minecraft: "1.21"
            neoforge: "21.0.167"
            java: "21"
            parchment_minecraft: "1.21"
            parchment_mappings: "2024.11.10"
          - minecraft: "1.21.1"
            neoforge: "21.1.242"
            java: "21"
            parchment_minecraft: "1.21.1"
            parchment_mappings: "2024.11.17"
          - minecraft: "1.21.2"
            neoforge: "21.2.1-beta"
            java: "21"
            parchment_minecraft: ""
            parchment_mappings: ""
          - minecraft: "1.21.3"
            neoforge: "21.3.97"
            java: "21"
            parchment_minecraft: "1.21.3"
            parchment_mappings: "2024.12.07"
          - minecraft: "1.21.4"
            neoforge: "21.4.157"
            java: "21"
            parchment_minecraft: "1.21.4"
            parchment_mappings: "2025.03.23"
          - minecraft: "1.21.5"
            neoforge: "21.5.98"
            java: "21"
            parchment_minecraft: "1.21.5"
            parchment_mappings: "2025.06.15"
          - minecraft: "1.21.6"
            neoforge: "21.6.20-beta"
            java: "21"
            parchment_minecraft: "1.21.6"
            parchment_mappings: "2025.06.29"
          - minecraft: "1.21.7"
            neoforge: "21.7.25-beta"
            java: "21"
            parchment_minecraft: "1.21.7"
            parchment_mappings: "2025.07.18"
          - minecraft: "1.21.8"
            neoforge: "21.8.54"
            java: "21"
            parchment_minecraft: "1.21.8"
            parchment_mappings: "2025.09.14"
          - minecraft: "1.21.9"
            neoforge: "21.9.16-beta"
            java: "21"
            parchment_minecraft: "1.21.9"
            parchment_mappings: "2025.10.05"
          - minecraft: "1.21.10"
            neoforge: "21.10.64"
            java: "21"
            parchment_minecraft: "1.21.10"
            parchment_mappings: "2025.10.12"
          - minecraft: "1.21.11"
            neoforge: "21.11.44"
            java: "21"
            parchment_minecraft: "1.21.11"
            parchment_mappings: "2025.12.20"
          - minecraft: "26.1"
            neoforge: "26.1.0.19-beta"
            java: "25"
            parchment_minecraft: ""
            parchment_mappings: ""
          - minecraft: "26.1.1"
            neoforge: "26.1.1.15-beta"
            java: "25"
            parchment_minecraft: ""
            parchment_mappings: ""
          - minecraft: "26.1.2"
            neoforge: "26.1.2.84"
            java: "25"
            parchment_minecraft: ""
            parchment_mappings: ""
          - minecraft: "26.2"
            neoforge: "26.2.0.26-beta"
            java: "25"
            parchment_minecraft: ""
            parchment_mappings: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v5.6.0
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Minecraft ${{ matrix.minecraft }}
        run: >
          ./gradlew build --no-daemon --no-configuration-cache --warning-mode all
          -Pminecraft_version=${{ matrix.minecraft }}
          -Pminecraft_version_range='[${{ matrix.minecraft }}]'
          -Pneo_version=${{ matrix.neoforge }}
          -Pparchment_minecraft_version=${{ matrix.parchment_minecraft }}
          -Pparchment_mappings_version=${{ matrix.parchment_mappings }}
